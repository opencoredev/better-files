name: better-files
options:
  createIntermediateGroups: true
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.2
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SPARKLE_PUBLIC_ED_KEY: ""
targets:
  BetterFiles:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: BetterFiles
    dependencies:
      - package: Sparkle
        product: Sparkle
    info:
      path: BetterFiles/Resources/Info.plist
      properties:
        CFBundleDisplayName: better-files
        CFBundleName: better-files
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundlePackageType: APPL
        LSMinimumSystemVersion: "14.0"
        SUFeedURL: "https://github.com/opencoredev/better-files/releases/latest/download/appcast.xml"
        SUPublicEDKey: "$(SPARKLE_PUBLIC_ED_KEY)"
        SUEnableAutomaticChecks: true
        SUAutomaticallyUpdate: false
        SUAllowsAutomaticUpdates: true
        SUShowReleaseNotes: true
        NSDesktopFolderUsageDescription: "better-files needs Desktop access so it can browse, search, copy, move, rename, delete, and manage files you choose there."
        NSDocumentsFolderUsageDescription: "better-files needs Documents access so it can browse, search, copy, move, rename, delete, and manage files you choose there."
        NSDownloadsFolderUsageDescription: "better-files needs Downloads access so it can browse, search, copy, move, rename, delete, and manage files you choose there."
        NSNetworkVolumesUsageDescription: "better-files needs network volume access so it can browse and manage files on connected servers you choose."
        NSRemovableVolumesUsageDescription: "better-files needs removable volume access so it can browse and manage files on connected drives you choose."
        NSHumanReadableCopyright: "Copyright © 2026 Leo. All rights reserved."
    entitlements:
      path: BetterFiles/Resources/BetterFiles.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.leo.better-files
        PRODUCT_NAME: better-files
        PRODUCT_MODULE_NAME: BetterFiles
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: BetterFiles/Resources/Info.plist
  BetterFilesTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: BetterFilesTests
    dependencies:
      - target: BetterFiles
    info:
      path: BetterFilesTests/Info.plist
      properties:
        CFBundleDisplayName: BetterFilesTests
        CFBundlePackageType: BNDL
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.leo.better-files.tests
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: BetterFilesTests/Info.plist
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/better-files.app/Contents/MacOS/better-files"
        BUNDLE_LOADER: "$(TEST_HOST)"
schemes:
  BetterFiles:
    build:
      targets:
        BetterFiles: all
        BetterFilesTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BetterFilesTests
    archive:
      config: Release
